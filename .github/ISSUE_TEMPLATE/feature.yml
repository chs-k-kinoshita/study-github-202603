name: Feature request
description: 新機能の提案
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 提案する機能の簡単な説明
      placeholder: どんな機能かを書いてください
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 背景・課題
      description: この機能が必要な理由や課題
      placeholder: 現在どんな問題がありますか？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 提案内容
      description: どのように解決するか
      placeholder: 具体的なアイデアを書いてください
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: 他に検討した方法があれば記載
      placeholder: 別のアプローチがあれば書いてください

  - type: checkboxes
    id: terms
    attributes:
      label: 確認事項
      options:
        - label: 同様のIssueが既に存在しないことを確認しました
          required: true